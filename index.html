<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cold Email Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 36px;
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 18px;
            color: #718096;
            margin-bottom: 30px;
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            text-align: left;
        }
        
        .feature {
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #2d3748;
        }
        
        .feature span {
            margin-right: 8px;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f0fff4;
            border-radius: 8px;
            color: #38a169;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📧</div>
        <h1>Premium Cold Email Platform</h1>
        <p>Professional email outreach made simple</p>
        
        <div class="features">
            <div class="feature"><span>🚀</span> Lightning Fast</div>
            <div class="feature"><span>📧</span> Gmail Integration</div>
            <div class="feature"><span>📊</span> Advanced Analytics</div>
            <div class="feature"><span>🤖</span> Automated Campaigns</div>
            <div class="feature"><span>✨</span> Modern UI</div>
            <div class="feature"><span>🔒</span> Secure</div>
        </div>
        
        <a href="dashboard.html" class="btn">Get Started</a>
        
        <div class="status">
            ✅ GitHub Pages Active!
        </div>
    </div>
</body>
</html>
